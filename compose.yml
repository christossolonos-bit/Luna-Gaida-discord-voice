services:
  giada:
    build:
      context: .
      dockerfile: Dockerfile
    image: giada-assistant:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      GIADA_SERVER_HOST: 0.0.0.0
      GIADA_SERVER_PORT: 8787
      GIADA_DATABASE_URL: file:/app/data/giada.sqlite
      SEARXNG_URL: http://searxng:8080
      FFMPEG_BINARY: ffmpeg
      YTDLP_BINARY: yt-dlp
    ports:
      - "8787:8787"
    volumes:
      - giada_data:/app/data
    depends_on:
      searxng:
        condition: service_started

  searxng:
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    volumes:
      - searxng_data:/etc/searxng
      - searxng_cache:/var/cache/searxng
    networks:
      - default

networks:
  default:
    name: giada-internal

volumes:
  giada_data:
  searxng_data:
  searxng_cache:
