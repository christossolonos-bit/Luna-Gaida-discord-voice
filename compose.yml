services:
  giada:
    build:
      context: .
      dockerfile: Dockerfile
    image: giada-assistant:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      GIADA_SERVER_HOST: 0.0.0.0
      GIADA_SERVER_PORT: 8787
      GIADA_DATABASE_URL: file:/app/data/giada.sqlite
      SEARXNG_URL: http://searxng:8080
      FFMPEG_BINARY: ffmpeg
      YTDLP_BINARY: yt-dlp
      YTDLP_COOKIES_PATH: /run/secrets/youtube-cookies.txt
      YTDLP_POT_PROVIDER_URL: http://bgutil-provider:4416
    ports:
      - "8787:8787"
    volumes:
      - giada_data:/app/data
      - ./secrets:/run/secrets:ro
      - giada_config:/app/config:ro
    depends_on:
      searxng:
        condition: service_started
      bgutil-provider:
        condition: service_healthy

  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    init: true
    expose:
      - "4416"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4416/ping').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  searxng:
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    volumes:
      - ./deploy/searxng:/etc/searxng:ro
      - searxng_cache:/var/cache/searxng
    networks:
      - default

networks:
  default:
    name: giada-internal

volumes:
  giada_data:
  giada_config:
  searxng_cache:
